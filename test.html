<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <!-- 引入 vchart 文件 -->
    <script src="https://unpkg.com/@visactor/vchart/build/index.min.js"></script>
  <head>
    <meta charset="utf-8" />
    <!-- 引入 vchart 文件 -->
    <script src="https://unpkg.com/@visactor/vchart/build/index.min.js"></script>
    <style>
      html, body {
        margin: 0;
        width: 100vw;
        height: 100vh;
      }
      body {
        display: flex;
        justify-content: center;
        align-items: center;
      }
      #chart {
        width: 100vw;
        height: 100vh;
      }
    </style>
  </head>

  <body>
  <!-- 为 vchart 准备一个具备大小（宽高）的 DOM，当然你也可以在 spec 配置中指定 -->
  <div id="chart"></div>

  <script>
const spec = {
  type: 'sankey',
  data: [{values: [{nodes: [{nodeName: 'Facebook Ads(step:1)'}, {nodeName: 'Google Ads(step:1)'}, {nodeName: 'Google Search(step:1)'}, {nodeName: 'Google Ads(step:2)'}, {nodeName: 'Facebook Social(step:1)'}, {nodeName: 'Klaviyo(step:2)'}, {nodeName: 'Facebook Ads(step:2)'}, {nodeName: 'Google Search(step:2)'}, {nodeName: 'Facebook Social(step:2)'}, {nodeName: 'Impact(step:2)'}, {nodeName: 'Klaviyo(step:3)'}, {nodeName: 'Google Search(step:3)'}, {nodeName: 'Impact(step:3)'}, {nodeName: 'Instagram Social(step:2)'}], 'links': [{source: 0, target: 3, value: 5254}, {source: 0, target: 5, value: 3070}, {source: 0, target: 7, value: 786}, {source: 0, target: 8, value: 1388}, {source: 0, target: 9, value: 806}, {source: 0, target: 13, value: 365}, {source: 1, target: 5, value: 1156}, {source: 1, target: 6, value: 1593}, {source: 1, target: 7, value: 1542}, {source: 1, target: 9, value: 746}, {source: 2, target: 3, value: 789}, {source: 3, target: 10, value: 734}, {source: 3, target: 11, value: 522}, {source: 3, target: 12, value: 385}, {source: 4, target: 6, value: 411}]}]}],
  categoryField: 'nodeName',
  valueField: 'value',
  sourceField: 'source',
  targetField: 'target',

  nodeAlign: 'left',
  nodeGap: 8,
  nodeWidth: 10,
  minNodeHeight: 4,

  title: {
    text: 'How energy is converted or transmitted before being consumed or lost',
    subtext: 'Data: Department of Energy & Climate Change via Tom Counsell',
    subtextStyle: {
      fontSize: 12
    }
  },

  label: {
    visible: true,
    style: {
      fontSize: 10
    }
  },

  node: {
    state: {
      hover: {
        stroke: '#333333'
      },
      selected: {
        fill: '#dddddd',
        stroke: '#333333',
        lineWidth: 1,
        brighter: 1,
        fillOpacity: 1
      }
    }
  },

  link: {
    state: {
      hover: {
        fillOpacity: 1
      },
      selected: {
        fill: '#dddddd',
        stroke: '#333333',
        lineWidth: 1,
        brighter: 1,
        fillOpacity: 1
      }
    }
  }
};


  const vchart = new VChart.default(spec, { dom: 'chart' });
  // const vchart = new VChart(spec, { dom: 'chart' });
  // 绘制
  vchart.renderSync();
  </script>


</body>


</html>
