<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>VChart Demo</title>

    <!-- 引入 VChart CDN -->
    <script src="https://unpkg.com/@visactor/vchart/build/index.min.js"></script>

    <style>
      #chart {
        width: 600px;
        height: 400px;
        margin: 40px auto;
      }
    </style>
  </head>

  <body>
    <div id="chart"></div>

    <script>
    const VChartConstructor = VChart.default;
  
    async function loadChart() {
      // 1. 请求 API 数据
      const res = await fetch('http://34.60.98.141:5001/sales');
      const data = await res.json();
  
      console.log('API数据：', data);
  
      // 2. 用 API 数据生成 spec
      const spec = {
        type: 'bar',
        data: [
          {
            id: 'barData',
            values: data
          }
        ],
        xField: 'month',
        yField: 'sales'
      };
  
      // 3. 创建图表
      const chart = new VChartConstructor(spec, {
        dom: 'chart'
      });
  
      chart.renderSync();
    }
  
    loadChart();
  </script>
  </body>
</html>
